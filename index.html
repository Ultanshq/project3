<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Gizi - Hitung Kalori</title>
    <!-- Menghubungkan ke file CSS spesifik halaman ini -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Navigasi Utama -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">GiziKu</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="active">Kalkulator</a></li>
                <!-- Navigasi ke folder lain -->
                <li><a href="./katalog/katalog.html">Katalog Makanan</a></li>
                <li><a href="./diary/diary.html">Diary Makan</a></li>
            </ul>
        </div>
    </nav>

    <!-- Konten Utama -->
    <main class="main-content">
        <section class="calculator-card">
            <h1>Hitung Kebutuhan Kalorimu</h1>
            <p class="subtitle">Masukkan data dirimu untuk mengetahui total kalori harian yang dibutuhkan tubuh.</p>

            <div class="input-group">
                <label for="gender">Jenis Kelamin</label>
                <select id="gender">
                    <option value="pria">Laki-laki</option>
                    <option value="wanita">Perempuan</option>
                </select>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label for="berat">Berat Badan (kg)</label>
                    <input type="number" id="berat" placeholder="Contoh: 70">
                </div>
                <div class="input-group">
                    <label for="tinggi">Tinggi Badan (cm)</label>
                    <input type="number" id="tinggi" placeholder="Contoh: 175">
                </div>
            </div>

            <div class="input-group">
                <label for="usia">Usia (tahun)</label>
                <input type="number" id="usia" placeholder="Contoh: 25">
            </div>

            <div class="input-group">
                <label for="aktivitas">Tingkat Aktivitas</label>
                <select id="aktivitas">
                    <option value="1.2">Jarang Olahraga (Sedenter)</option>
                    <option value="1.375">Olahraga Ringan (1-3 hari/minggu)</option>
                    <option value="1.55">Olahraga Sedang (3-5 hari/minggu)</option>
                    <option value="1.725">Olahraga Berat (6-7 hari/minggu)</option>
                </select>
            </div>

            <button type="button" class="btn-hitung" onclick="hitungKalori()">Hitung Sekarang</button>

            <!-- Tempat Menampilkan Hasil (Awalnya Tersembunyi) -->
            <div id="result-container" class="result-box hidden">
                <h3>Estimasi Kebutuhan Kalori Anda:</h3>
                <div class="calorie-value">
                    <span id="calorie-number">0</span> 
                    <span class="unit">kkal / hari</span>
                </div>
                <p class="result-note">Ini adalah jumlah kalori untuk mempertahankan berat badan Anda saat ini.</p>
            </div>
        </section>
    </main>

    <!-- Menghubungkan ke file JS spesifik halaman ini -->
    <script src="index.js"></script>
</body>
</html>
